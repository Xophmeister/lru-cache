name: Generate README

on:
  pull_request:
    paths:
      - 'lru-cache.wiki'
      - 'scripts/wiki2html.scm'

permissions:
  contents: read

jobs:

  generate:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Generate README.md
        run: nix run .#generate-readme -- lru-cache.wiki > README.md

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload README.md artefact
        if: steps.check.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: readme
          path: README.md

  commit:
    needs: generate
    if: needs.generate.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Download README.md artefact
        uses: actions/download-artifact@v4
        with:
          name: readme

      - name: Commit if changed
        if: github.event.pull_request.head.repo.fork == false
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Generate README.md from lru-cache.wiki"
          git push

      - name: Check for drift (fork PRs)
        if: github.event.pull_request.head.repo.fork == true
        run: |
          git add README.md
          if ! git diff --staged --quiet; then
            echo "::error::README.md is out of date. Please regenerate it locally by running: nix run .#generate-readme -- lru-cache.wiki > README.md"
            exit 1
          fi
